  <style>
    /* Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    ::selection { background: #6B3FF5; color: #fff; }
    a { text-decoration: none; }
    button { cursor: pointer; }
    img { display: block; max-width: 100%; }

    /* ── Scroll Fade Animations ── */
    .fade-up   { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
    .fade-left { opacity: 0; transform: translateX(-28px); transition: opacity 0.65s ease, transform 0.65s ease; }
    .fade-right{ opacity: 0; transform: translateX(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
    .fade-up.visible, .fade-left.visible, .fade-right.visible {
      opacity: 1; transform: none;
    }

    /* ── Navigation ── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 999;
      transition: background 0.3s, box-shadow 0.3s, border-bottom 0.3s;
      padding: 0 48px;
    }
    nav.scrolled {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid #F0F0F0;
      box-shadow: 0 2px 20px rgba(0,0,0,0.04);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      height: 64px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 1.35rem; color: #1a1a1a;
      letter-spacing: -0.01em;
    }
    .nav-links { display: flex; gap: 36px; }
    .nav-link {
      position: relative; font-size: 0.8rem; font-weight: 500;
      color: #666; letter-spacing: 0.07em; text-transform: uppercase;
      background: none; border: none; padding: 0;
      transition: color 0.2s;
    }
    .nav-link::after {
      content: ''; position: absolute; left: 0; bottom: -4px;
      width: 0; height: 1.5px; background: #6B3FF5;
      transition: width 0.25s ease;
    }
    .nav-link:hover, .nav-link.active { color: #1a1a1a; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }

    /* ── Buttons ── */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 32px; background: #880849; color: #ffffff;
      border: none; border-radius: 100px;
      font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background: #f0abda; transform: translateY(-1px); }

    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border: 1.5px solid #ccc; background: transparent;
      color: #1a1a1a; border-radius: 100px;
      font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 500;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-outline:hover { border-color: #6B3FF5; color: #880849; }

    /* ── Tags / Pills ── */
    .tag {
      padding: 4px 12px; background: #F3EFFF; color: #6B3FF5;
      border-radius: 100px; font-size: 0.73rem; font-weight: 500;
      display: inline-block;
    }
    .availability-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 16px; border: 1px solid #E0E0E0; border-radius: 100px;
      font-size: 0.78rem; font-weight: 500; color: #030303;
      letter-spacing: 0.02em; margin-bottom: 28px;
    }
    .availability-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #880849;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 5; }
      50% { opacity: 0.35; }
    }

    /* ── Section Eyebrow ── */
    .eyebrow {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: #6B3FF5; margin-bottom: 10px; display: block;
    }

    /* ── Sections ── */
    section { padding: 100px 48px; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-alt { background: #FAFAFA; }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      font-weight: 700; margin-bottom: 56px;
      line-height: 1.15; letter-spacing: -0.01em;
    }

    /* ── Hero ── */
    #home {
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}

/* Animated background layer */
#home::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #6B3FF5, #9B6DFF, #F0ABDA);
  opacity: 0.5; /* 50% opacity */
  animation: bgMove 12s ease-in-out infinite alternate;
  z-index: 0;
}

/* Keep your content above the background */
#home > * {
  position: relative;
  z-index: 1;
}

@keyframes bgMove {
  0% { transform: scale(1) translate(0,0); }
  50% { transform: scale(1.1) translate(-20px, 20px); }
  100% { transform: scale(1) translate(0,0); }
}
@keyframes bgShift {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

}

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── SVG Icons (inline — no lucide dependency needed) ─────────────── */
    const Icon = ({ d, d2, size = 16, style = {} }) => (

        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>

    );

    const icons = {
      arrowRight:  'M5 12h14 M12 5l7 7-7 7',
      download:    'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4 M7 10l5 5 5-5 M12 15V3',

      mapPin:      'M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z M12 7a3 3 0 100 6 3 3 0 000-6z',
      calendar:    'M8 2v4 M16 2v4 M3 8h18 M21 6H3a2 2 0 00-2 2v12a2 2 0 002 2h18a2 2 0 002-2V8a2 2 0 00-2-2z',
      briefcase:   'M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2',
      palette:     'M12 2a10 10 0 100 20 10 10 0 000-20z M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32',
      code2:       'M18 16l4-4-4-4 M6 8l-4 4 4 4 M14.5 4l-5 16',
      monitor:     'M4 3h16a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2z M8 21h8 M12 17v4',
    };

    /* ── Scroll fade hook ─────────────────────────────────────────────── */
    function useFadeIn(threshold = 0.12) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) setVisible(true); },
          { threshold }
        );
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return [ref, visible];
    }

    /* ── Scroll Y ─────────────────────────────────────────────────────── */
    function useScrollY() {
      const [y, setY] = useState(0);
      useEffect(() => {
        const h = () => setY(window.scrollY);
        window.addEventListener('scroll', h, { passive: true });
        return () => window.removeEventListener('scroll', h);
      }, []);
      return y;
    }

    /* ── FadeBox ──────────────────────────────────────────────────────── */
    function FadeBox({ children, dir = 'up', delay = 0, style: s = {} }) {
      const [ref, visible] = useFadeIn();
      const cls = dir === 'left' ? 'fade-left' : dir === 'right' ? 'fade-right' : 'fade-up';
      return (
        <div
          ref={ref}
          className={`${cls}${visible ? ' visible' : ''}`}
          style={{ transitionDelay: `${delay}s`, ...s }}
        >
          {children}
        </div>
      );
    }

    /* ── Nav ──────────────────────────────────────────────────────────── */
    function Nav({ active, scrollTo }) {
      const y = useScrollY();
      const sections = ['Home', 'About', 'Experience', 'Skills', 'Projects', 'Contact'];
      return (
        <nav className={y > 40 ? 'scrolled' : ''}>
          <div className="nav-inner">
            <span className="nav-logo">HP.</span>
            <div className="nav-links">
              {sections.map(s => (
                <button
                  key={s}
                  className={`nav-link${active === s.toLowerCase() ? ' active' : ''}`}
                  onClick={() => scrollTo(s.toLowerCase())}
                >{s}</button>
              ))}
            </div>
          </div>
        </nav>
      );
    }

    /* ── Hero Section ─────────────────────────────────────────────────── */
    function Hero({ scrollTo }) {
      return (
        <section id="home">
          <div className="section-inner">
            <div className="hero-grid">

              {/* Left */}
              <div>
                <FadeBox>
                  <div className="availability-pill">
                    <span className="availability-dot"></span>
                    Available for opportunities
                  </div>
                </FadeBox>
                <FadeBox delay={0.1}>
                  hey!<h1 className="hero-h1">
                    Hitesha<br />
                    <span className="accent">Patil</span>
                  </h1>
                </FadeBox>
                <FadeBox delay={0.2}>
                  <p className="hero-sub">
                    UI/UX Designer, Graphic Designer & Front-End Developer building
                    user-centered digital products - from Figma prototypes to React.js in production.
                  </p>
                </FadeBox>
                <FadeBox delay={0.3}>
                  <div className="hero-btns">
                    <a
                      href="https://drive.google.com/file/d/1DhZgMo_pA2BV5zuzUa1db76FGBU5R6Ed/view?usp=drive_link"
                      target="_blank" rel="noopener noreferrer"
                      className="btn-primary"
                    >
                      View My Work
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
                    </a>

    /* ── App ──────────────────────────────────────────────────────────── */
    function App() {
      const [activeSection, setActiveSection] = useState('home');

      // Active section tracking
      useEffect(() => {
        const sections = ['home', 'about', 'experience', 'skills', 'projects', 'contact'];
        const handler = () => {
          const current = sections.find(id => {
            const el = document.getElementById(id);
            if (!el) return false;
            const r = el.getBoundingClientRect();
            return r.top <= 130 && r.bottom >= 130;
          });
          if (current) setActiveSection(current);
        };
        window.addEventListener('scroll', handler, { passive: true });
        return () => window.removeEventListener('scroll', handler);
      }, []);

      const scrollTo = (id) => {
        document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
      };

      return (
        <>
          <Nav active={activeSection} scrollTo={scrollTo} />

          <Contact />
          <footer>

        </>
      );
